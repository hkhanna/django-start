services:
  - type: web
    runtime: python
    name: django-start
    repo: https://github.com/hkhanna/django-start
    region: virginia
    plan: starter
    branch: main
    buildCommand: uv sync --frozen --no-dev && uv run python manage.py collectstatic --no-input
    # Migrations must run at start: the disk is not mounted during build or pre-deploy.
    startCommand: uv run python manage.py migrate && uv run gunicorn config.wsgi:application
    disk:
      name: data
      mountPath: /var/data
      sizeGB: 1 # Must be 1 or a multiple of 5
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.production
      - key: DJANGO_SECRET_KEY
        generateValue: true
