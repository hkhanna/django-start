name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on PRs; run_id gives pushes to main a unique
# group so they are never canceled.
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v8.3.2
        with:
          enable-cache: true
      - run: uv sync --locked
      - run: uv run ruff check
      - run: uv run ruff format --check
      - run: uv run mypy .
      - run: uv run python manage.py makemigrations --check --dry-run
      - name: Run tests
        run: uv run pytest 
